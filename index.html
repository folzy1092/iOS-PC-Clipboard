<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clipboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0E0E0E;
      --surface:   #141414;
      --card:      #1A1A1A;
      --border:    #252525;
      --border-2:  #2E2E2E;
      --text:      #F0F0F0;
      --text-2:    #888;
      --text-3:    #555;
      --accent:    #F0F0F0;
      --green:     #3DDB6A;
      --red:       #FF4D4D;
      --sent-bg:   #1E1E1E;
      --recv-bg:   #1E1E1E;
      --radius:    2px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 300;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border-2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg { opacity: 0.7; }

    .site-title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 400;
      color: var(--text-2);
      transition: all 0.3s;
    }

    .status-pill.live { border-color: #1a3a24; color: var(--green); }
    .status-pill.dead { border-color: #3a1a1a; color: var(--red); }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-pill.live .status-dot { animation: pulse 2.5s ease infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* ── MAIN LAYOUT ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      min-height: 0;
    }

    .col {
      display: flex;
      flex-direction: column;
      padding: 24px;
      overflow: hidden;
      min-height: 0;
    }

    .col + .col { border-left: 1px solid var(--border); }

    /* ── COLUMN HEADERS ── */
    .col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .col-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    /* ── TOGGLES ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .toggle-row:first-of-type { border-top: 1px solid var(--border); }

    .toggle-label {
      font-size: 12px;
      color: var(--text-2);
      font-weight: 400;
    }

    .toggle {
      position: relative;
      width: 34px;
      height: 18px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border-2);
      border-radius: 18px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--text-3);
      transition: transform 0.2s, background 0.2s;
      pointer-events: none;
    }

    .toggle input:checked ~ .toggle-track { background: #1a3a24; }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); background: var(--green); }

    /* ── TEXTAREA ── */
    .field-label {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 6px;
      font-weight: 500;
    }

    textarea {
      width: 100%;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 400;
      line-height: 1.6;
      resize: none;
      transition: border-color 0.15s;
      outline: none;
    }

    textarea:focus { border-color: var(--border-2); }
    textarea::placeholder { color: var(--text-3); }

    #text     { height: 140px; }
    #sendText { height: 80px; }

    /* ── BUTTONS ── */
    .btn {
      padding: 9px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text-2);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 400;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      letter-spacing: 0.01em;
    }

    .btn:hover { background: var(--card); color: var(--text); border-color: var(--border-2); }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
      font-weight: 500;
    }

    .btn-primary:hover { background: #d0d0d0; border-color: #d0d0d0; color: var(--bg); }

    .btn-ghost {
      background: transparent;
      border-color: transparent;
      color: var(--text-3);
      font-size: 11px;
      padding: 5px 8px;
    }

    .btn-ghost:hover { color: var(--text-2); background: transparent; border-color: transparent; }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-row .btn { flex: 1; }

    /* ── SECTION DIVIDER ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
      flex-shrink: 0;
    }

    /* ── STATUS TEXT ── */
    #statusText {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 12px;
      font-family: 'JetBrains Mono', monospace;
      min-height: 16px;
      transition: color 0.3s;
    }

    #statusText.ok  { color: var(--green); }
    #statusText.err { color: var(--red); }

    /* ── IMAGE SECTIONS ── */
    .img-section { display: none; }

    .img-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .img-preview {
      width: 100%;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      display: block;
    }

    .img-save-link {
      display: block;
      text-align: center;
      padding: 8px;
      background: var(--surface);
      color: var(--text-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      font-size: 12px;
      margin-top: 8px;
      transition: background 0.15s, color 0.15s;
    }

    .img-save-link:hover { background: var(--card); color: var(--text); }

    /* ── HISTORY LIST ── */
    .history-scroll {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      min-height: 0;
    }

    .history-scroll::-webkit-scrollbar { display: none; }

    .h-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .h-item:last-child { border-bottom: none; }

    .h-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .h-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-3);
    }

    .h-badge {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 2px;
    }

    .h-badge.pc    { background: #1a1a2a; color: #7b7bcc; border: 1px solid #2a2a4a; }
    .h-badge.phone { background: #1a1a1a; color: var(--text-3); border: 1px solid var(--border); }

    .h-content {
      font-size: 12px;
      color: var(--text-2);
      word-break: break-word;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .h-content.img-entry { color: var(--text-3); font-style: italic; }

    /* ── REQUEST LIST ── */
    .r-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .r-item:last-child { border-bottom: none; }

    .r-top {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .r-badge {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 2px;
    }

    .r-badge.sent     { background: #1a1a1a; color: var(--text-3); border: 1px solid var(--border); }
    .r-badge.received { background: #12201a; color: #4aad6e; border: 1px solid #1a3020; }

    .r-type {
      font-size: 10px;
      color: var(--text-3);
    }

    .r-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-3);
      margin-left: auto;
    }

    .r-details {
      font-size: 12px;
      color: var(--text-2);
      line-height: 1.4;
    }

    /* ── EMPTY STATES ── */
    .empty-state {
      padding: 32px 0;
      text-align: center;
      color: var(--text-3);
      font-size: 12px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1100px) {
      main { grid-template-columns: 1fr 1fr; }
      .col:nth-child(3) { border-left: none; border-top: 1px solid var(--border); grid-column: 1 / -1; max-height: 320px; }
    }

    @media (max-width: 680px) {
      main { grid-template-columns: 1fr; }
      .col + .col { border-left: none; border-top: 1px solid var(--border); }
      .col:nth-child(3) { grid-column: unset; max-height: 280px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-mark">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="1" width="8" height="2" rx="1" fill="#F0F0F0"/>
        <rect x="1" y="3" width="12" height="9" rx="1.5" fill="none" stroke="#F0F0F0" stroke-width="1"/>
        <rect x="3.5" y="5.5" width="7" height="1" rx="0.5" fill="#F0F0F0"/>
        <rect x="3.5" y="7.5" width="7" height="1" rx="0.5" fill="#F0F0F0"/>
        <rect x="3.5" y="9.5" width="4" height="1" rx="0.5" fill="#F0F0F0"/>
      </svg>
    </div>
    <span class="site-title">Clipboard</span>
  </div>

  <div class="status-pill" id="statusPill">
    <span class="status-dot"></span>
    <span id="statusLabel">Подключение...</span>
  </div>
</header>

<main>
  <!-- КОЛОНКА 1: Управление -->
  <div class="col">
    <div class="col-header">
      <span class="col-title">Управление</span>
    </div>

    <!-- Toggles -->
    <div class="toggle-row">
      <span class="toggle-label">iPhone → буфер ПК</span>
      <label class="toggle">
        <input type="checkbox" id="autoToPcToggle" onchange="updateToggles()">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>

    <div class="toggle-row" style="margin-bottom:20px;">
      <span class="toggle-label">ПК → iPhone авто</span>
      <label class="toggle">
        <input type="checkbox" id="autoToPhoneToggle" onchange="updateToggles()">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>

    <!-- PC text -->
    <div class="field-label">Текст с iPhone</div>
    <textarea id="text" readonly placeholder="Ожидание..."></textarea>
    <div class="btn-row">
      <button class="btn" onclick="manualCopy()">Скопировать</button>
    </div>

    <hr class="divider">

    <!-- Send to phone -->
    <div class="field-label">Отправить на iPhone</div>
    <textarea id="sendText" placeholder="Введи текст..."></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="sendToPhone()">Отправить</button>
    </div>

    <!-- Phone image -->
    <div id="phoneImgSection" class="img-section">
      <hr class="divider">
      <div class="img-label-row">
        <span class="field-label" style="margin-bottom:0;">Изображение с iPhone</span>
      </div>
      <img id="phoneImg" class="img-preview" alt="">
    </div>

    <!-- PC image -->
    <div id="pcImgSection" class="img-section">
      <hr class="divider">
      <div class="img-label-row">
        <span class="field-label" style="margin-bottom:0;">Изображение из буфера ПК</span>
      </div>
      <img id="pcImg" class="img-preview" alt="">
      <a id="pcImgDownload" class="img-save-link" download="clipboard.png">Сохранить</a>
    </div>

    <div id="statusText"></div>
  </div>

  <!-- КОЛОНКА 2: История буфера -->
  <div class="col">
    <div class="col-header">
      <span class="col-title">История буфера</span>
      <button class="btn-ghost" onclick="clearHistory()">Очистить</button>
    </div>
    <div class="history-scroll" id="historyContainer">
      <div class="empty-state">История пуста</div>
    </div>
  </div>

  <!-- КОЛОНКА 3: Запросы с iPhone -->
  <div class="col">
    <div class="col-header">
      <span class="col-title">Запросы с iPhone</span>
      <button class="btn-ghost" onclick="clearRequests()">Очистить</button>
    </div>
    <div class="history-scroll" id="requestsContainer">
      <div class="empty-state">Нет запросов</div>
    </div>
  </div>
</main>

<script>
  const socket = io();
  let lastUpdated   = 0;
  let lastPcImgHash    = null;
  let lastPhoneImgHash = null;

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function setStatus(text, cls) {
    const el = document.getElementById('statusText');
    el.textContent = text;
    el.className = cls || '';
    if (cls === 'ok') setTimeout(() => { if (el.className === 'ok') el.className = ''; }, 3000);
  }

  socket.on('connect', () => {
    const pill = document.getElementById('statusPill');
    pill.className = 'status-pill live';
    document.getElementById('statusLabel').textContent = 'Подключено';
  });

  socket.on('disconnect', () => {
    const pill = document.getElementById('statusPill');
    pill.className = 'status-pill dead';
    document.getElementById('statusLabel').textContent = 'Нет соединения';
  });

  socket.on('state_update', (d) => {
    document.getElementById('text').value = d.phone_text || '';
    document.getElementById('autoToPcToggle').checked    = d.auto_to_pc;
    document.getElementById('autoToPhoneToggle').checked = d.auto_to_phone;

    updateHistory(d.history || []);
    if (d.requests) updateRequests(d.requests);

    if (d.has_phone_image) {
      const hash = d.last_phone_img_hash || null;
      if (hash !== lastPhoneImgHash) {
        lastPhoneImgHash = hash;
        fetch('/get-phone-image').then(r => r.json()).then(r => {
          if (r.image) {
            document.getElementById('phoneImg').src = 'data:image/png;base64,' + r.image;
            document.getElementById('phoneImgSection').style.display = 'block';
          }
        });
      }
    } else {
      lastPhoneImgHash = null;
      document.getElementById('phoneImgSection').style.display = 'none';
    }

    if (d.has_pc_image) {
      const hash = d.last_img_hash || null;
      if (hash !== lastPcImgHash) {
        lastPcImgHash = hash;
        fetch('/get-image').then(r => r.json()).then(r => {
          if (r.image) {
            const src = 'data:image/png;base64,' + r.image;
            document.getElementById('pcImg').src = src;
            document.getElementById('pcImgDownload').href = src;
            document.getElementById('pcImgSection').style.display = 'block';
          }
        });
      }
    } else {
      lastPcImgHash = null;
      document.getElementById('pcImgSection').style.display = 'none';
    }

    if (d.updated_at !== lastUpdated && lastUpdated !== 0) {
      const ev = d.last_event || '';
      const statusMap = {
        'phone_sent':      'синхронизировано с iPhone',
        'phone_sent_img':  'фото получено с iPhone',
        'pc_copied':       'скопировано на ПК',
        'pc_copied_img':   'фото скопировано на ПК',
        'panel_sent':      'отправлено на iPhone',
        'phone_fetched':   'iPhone забрал текст',
        'phone_fetched_img': 'iPhone забрал фото',
      };
      const msg = statusMap[ev] || 'синхронизировано';
      document.title = '[ + ] Clipboard';
      setTimeout(() => document.title = 'Clipboard', 3000);
      setStatus(msg, 'ok');
    }
    lastUpdated = d.updated_at;
  });

  function updateHistory(history) {
    const c = document.getElementById('historyContainer');
    if (!history || !history.length) {
      c.innerHTML = '<div class="empty-state">История пуста</div>';
      return;
    }
    c.innerHTML = history.map(item => {
      const time   = new Date(item.time * 1000).toLocaleTimeString('ru-RU');
      const srcCls = item.source === 'pc' ? 'pc' : 'phone';
      const srcLbl = item.source === 'pc' ? 'ПК' : 'iPhone';
      const isImg  = item.type === 'image';
      const raw    = item.text || '';
      const preview = isImg ? 'изображение' : escapeHtml(raw.length > 120 ? raw.slice(0, 120) + '…' : raw);
      return `
        <div class="h-item">
          <div class="h-meta">
            <span class="h-badge ${srcCls}">${srcLbl}</span>
            <span class="h-time">${escapeHtml(time)}</span>
          </div>
          <div class="h-content ${isImg ? 'img-entry' : ''}">${preview}</div>
        </div>`;
    }).join('');
  }

  function updateRequests(requests) {
    const c = document.getElementById('requestsContainer');
    if (!requests || !requests.length) {
      c.innerHTML = '<div class="empty-state">Нет запросов</div>';
      return;
    }
    c.innerHTML = requests.map(req => {
      const time    = new Date(req.time * 1000).toLocaleTimeString('ru-RU');
      const actCls  = req.action === 'sent' ? 'sent' : 'received';
      const actLbl  = req.action === 'sent' ? 'отправлено' : 'получено';
      const typeLbl = req.type === 'text' ? 'текст' : 'изображение';
      const details = req.details || '';
      return `
        <div class="r-item">
          <div class="r-top">
            <span class="r-badge ${actCls}">${actLbl}</span>
            <span class="r-type">${typeLbl}</span>
            <span class="r-time">${escapeHtml(time)}</span>
          </div>
          ${details ? `<div class="r-details">${escapeHtml(details)}</div>` : ''}
        </div>`;
    }).join('');
  }

  function updateToggles() {
    socket.emit('toggle_settings', {
      auto_to_pc:    document.getElementById('autoToPcToggle').checked,
      auto_to_phone: document.getElementById('autoToPhoneToggle').checked
    });
    setStatus('настройки сохранены', 'ok');
  }

  function manualCopy() {
    const text = document.getElementById('text').value;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => setStatus('скопировано', 'ok'));
  }

  function sendToPhone() {
    const text = document.getElementById('sendText').value;
    if (!text) { setStatus('введи текст', 'err'); return; }
    socket.emit('manual_send_to_phone', { text });
    setStatus('отправлено на iPhone', 'ok');
    document.getElementById('sendText').value = '';
  }

  function clearHistory() {
    if (!confirm('Очистить историю?')) return;
    socket.emit('clear_history');
    setStatus('история очищена');
  }

  function clearRequests() {
    if (!confirm('Очистить историю запросов?')) return;
    socket.emit('clear_requests');
    setStatus('запросы очищены');
  }
</script>
</body>
</html>
